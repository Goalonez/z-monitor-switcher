name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      notes_file: ${{ steps.meta.outputs.notes_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate tag and main ancestry
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z, got: ${TAG}" >&2
            exit 1
          fi

          MAIN_REF="refs/remotes/origin/main"
          git fetch --no-tags origin "+refs/heads/main:${MAIN_REF}"
          TAG_COMMIT="$(git rev-list -n 1 "${TAG}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" "${MAIN_REF}"; then
            echo "Tag ${TAG} (${TAG_COMMIT}) must point to a commit reachable from origin/main." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          NOTES_FILE="docs/releases/${TAG}.md"

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "notes_file=${NOTES_FILE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate versions and release notes
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");

          const version = process.env.VERSION;
          const notesFile = process.env.NOTES_FILE;
          const errors = [];

          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriConf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const tauriVersion = tauriConf.version;
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^\[package\][\s\S]*?^version\s*=\s*"([^"]+)"/m)?.[1];

          const updaterPubkey = tauriConf.plugins?.updater?.pubkey;
          if (!updaterPubkey || updaterPubkey.includes("REPLACE_WITH")) {
            errors.push("plugins.updater.pubkey in src-tauri/tauri.conf.json is missing or still a placeholder");
          }

          for (const [file, fileVersion] of [
            ["package.json", packageVersion],
            ["src-tauri/tauri.conf.json", tauriVersion],
            ["src-tauri/Cargo.toml", cargoVersion],
          ]) {
            if (fileVersion !== version) {
              errors.push(`${file} version is ${fileVersion ?? "missing"}, expected ${version}`);
            }
          }

          if (!fs.existsSync(notesFile)) {
            errors.push(`${notesFile} is missing`);
          } else {
            const notes = fs.readFileSync(notesFile, "utf8").trim();
            if (!notes) errors.push(`${notesFile} is empty`);
            if (!notes.includes("## English")) errors.push(`${notesFile} must include a "## English" section`);
            if (!notes.includes("## 简体中文")) errors.push(`${notesFile} must include a "## 简体中文" section`);
          }

          if (errors.length) {
            console.error(errors.join("\n"));
            process.exit(1);
          }
          NODE

  build-macos:
    name: Build macOS DMG
    runs-on: macos-14
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Apple Silicon runner
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "This workflow publishes a macOS-arm64 asset and must run on an arm64 macOS runner." >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required to create updater artifacts." >&2
            exit 1
          fi

          probe="$(mktemp)"
          printf "updater signing preflight" > "${probe}"

          if TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${SIGNING_PASSWORD:-}" pnpm tauri signer sign "${probe}" >/dev/null 2>&1; then
            effective_password="${SIGNING_PASSWORD:-}"
          elif pnpm tauri signer sign "${probe}" >/dev/null 2>&1; then
            effective_password=""
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD did not match; continuing with an unencrypted updater key." >&2
          else
            echo "Unable to decode TAURI_SIGNING_PRIVATE_KEY. Update the TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret, or clear it if the key is unencrypted." >&2
            exit 1
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY__"
            echo "${TAURI_SIGNING_PRIVATE_KEY}"
            echo "__TAURI_KEY__"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<__TAURI_PASSWORD__"
            echo "${effective_password}"
            echo "__TAURI_PASSWORD__"
          } >> "${GITHUB_ENV}"

      - name: Build DMG
        shell: bash
        run: pnpm tauri build --bundles app,dmg --ci

      - name: Collect DMG and updater artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          count="$(find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f | wc -l | tr -d " ")"
          if [[ "${count}" != "1" ]]; then
            echo "Expected exactly one DMG, found ${count}" >&2
            find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f >&2
            exit 1
          fi

          dmg="$(find src-tauri/target -path "*/release/bundle/dmg/*.dmg" -type f -print -quit)"
          cp "${dmg}" "release-assets/Z-Monitor-Switcher.dmg"

          tar_count="$(find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz" -type f | wc -l | tr -d " ")"
          if [[ "${tar_count}" != "1" ]]; then
            echo "Expected exactly one updater .app.tar.gz, found ${tar_count}" >&2
            find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz*" -type f >&2
            exit 1
          fi

          tarball="$(find src-tauri/target -path "*/release/bundle/macos/*.app.tar.gz" -type f -print -quit)"
          test -f "${tarball}.sig" || { echo "Missing updater signature ${tarball}.sig" >&2; exit 1; }
          cp "${tarball}" "release-assets/Z-Monitor-Switcher-aarch64.app.tar.gz"
          cp "${tarball}.sig" "release-assets/Z-Monitor-Switcher-aarch64.app.tar.gz.sig"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    name: Build Windows NSIS installer
    runs-on: windows-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify x64 Windows runner
        shell: pwsh
        run: |
          if (-not [Environment]::Is64BitOperatingSystem) {
            throw "This workflow publishes a Windows-x64 asset and must run on a 64-bit Windows runner."
          }

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false

          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required to create updater artifacts."
          }

          $probe = New-TemporaryFile
          Set-Content -Path $probe -Value "updater signing preflight" -NoNewline

          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:SIGNING_PASSWORD
          pnpm tauri signer sign $probe *> $null
          if ($LASTEXITCODE -eq 0) {
            $effectivePassword = $env:SIGNING_PASSWORD
          } else {
            Remove-Item Env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD -ErrorAction SilentlyContinue
            pnpm tauri signer sign $probe *> $null
            if ($LASTEXITCODE -eq 0) {
              $effectivePassword = ""
              Write-Warning "TAURI_SIGNING_PRIVATE_KEY_PASSWORD did not match; continuing with an unencrypted updater key."
            } else {
              throw "Unable to decode TAURI_SIGNING_PRIVATE_KEY. Update the TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret, or clear it if the key is unencrypted."
            }
          }

          Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY__"
          Add-Content -Path $env:GITHUB_ENV -Value $env:TAURI_SIGNING_PRIVATE_KEY
          Add-Content -Path $env:GITHUB_ENV -Value "__TAURI_KEY__"
          Add-Content -Path $env:GITHUB_ENV -Value "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<__TAURI_PASSWORD__"
          Add-Content -Path $env:GITHUB_ENV -Value $effectivePassword
          Add-Content -Path $env:GITHUB_ENV -Value "__TAURI_PASSWORD__"

      - name: Build NSIS installer
        shell: pwsh
        run: pnpm tauri build --bundles nsis --ci

      - name: Collect NSIS installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $installers = @(Get-ChildItem -Path src-tauri/target -Recurse -Filter *.exe | Where-Object {
            $_.FullName -match "\\release\\bundle\\nsis\\"
          })

          if ($installers.Count -ne 1) {
            Write-Error "Expected exactly one NSIS installer, found $($installers.Count): $($installers.FullName -join ', ')"
          }

          $sig = "$($installers[0].FullName).sig"
          if (-not (Test-Path $sig)) {
            Write-Error "Missing updater signature: $sig"
          }

          Copy-Item $installers[0].FullName "release-assets/Z-Monitor-Switcher.exe"
          Copy-Item $sig "release-assets/Z-Monitor-Switcher.exe.sig"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: |
            release-assets/*.exe
            release-assets/*.exe.sig
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-macos
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.validate.outputs.tag }}
      VERSION: ${{ needs.validate.outputs.version }}
      NOTES_FILE: ${{ needs.validate.outputs.notes_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail

          test -f "release-assets/Z-Monitor-Switcher.dmg"
          test -f "release-assets/Z-Monitor-Switcher.exe"
          test -f "release-assets/Z-Monitor-Switcher.exe.sig"
          test -f "release-assets/Z-Monitor-Switcher-aarch64.app.tar.gz"
          test -f "release-assets/Z-Monitor-Switcher-aarch64.app.tar.gz.sig"

          if find release-assets -type f -name "*.msi" | grep -q .; then
            echo "MSI assets are not published for this project." >&2
            exit 1
          fi

      - name: Generate updater manifest
        shell: bash
        run: |
          set -euo pipefail

          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          jq -n \
            --arg version "${VERSION}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_sig "$(cat "release-assets/Z-Monitor-Switcher-aarch64.app.tar.gz.sig")" \
            --arg mac_url "${BASE_URL}/Z-Monitor-Switcher-aarch64.app.tar.gz" \
            --arg win_sig "$(cat "release-assets/Z-Monitor-Switcher.exe.sig")" \
            --arg win_url "${BASE_URL}/Z-Monitor-Switcher.exe" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > release-assets/latest.json

          # Signatures are embedded in latest.json; standalone .sig files are
          # not published as release assets.
          rm release-assets/*.sig

          cat release-assets/latest.json

      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${TAG}" release-assets/* \
            --title "Z Monitor Switcher ${TAG}" \
            --notes-file "${NOTES_FILE}" \
            --verify-tag
